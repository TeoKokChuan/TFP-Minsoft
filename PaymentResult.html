<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Result — Minsoft Solution</title>
<link rel="stylesheet" href="PaymentResult.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --sky: #38bdf8;
  --sky-light: #7dd3fc;
  --accent: #a78bfa;
  --bg: #060d1c;
  --bg-card: #0b1628;
  --bg-surface: #101e34;
  --bg-input: #0d1a2e;
  --text: #e2ecff;
  --text-muted: #7a93b5;
  --border: rgba(56,189,248,0.1);
  --border-md: rgba(56,189,248,0.2);
  --border-strong: rgba(56,189,248,0.35);
  --green: #4ade80;
}
 
html, body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}
 
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 62px;
  background: rgba(6,13,28,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
 
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.25rem;
  color: var(--sky);
  text-decoration: none;
  letter-spacing: -0.5px;
}
 
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.breadcrumb span.active { color: var(--text); font-weight: 500; }
.breadcrumb i { font-size: 0.65rem; }
 
.secure-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.78rem;
  color: var(--text-muted);
}
.secure-badge i { color: var(--green); font-size: 0.8rem; }
 
/* STEPS */
.steps-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 24px 24px;
}
.step {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.82rem; font-weight: 500;
  color: var(--text-muted);
}
.step.active { color: var(--sky); }
.step.done { color: var(--green); }
.step-num {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1.5px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: 700;
  flex-shrink: 0;
}
.step.active .step-num {
  background: var(--sky);
  color: var(--bg);
  border-color: var(--sky);
}
.step.done .step-num {
  background: var(--green);
  color: var(--bg);
  border-color: var(--green);
}
.step-line {
  width: 60px; height: 1px;
  background: var(--border);
  margin: 0 12px;
}
 
.page {
  display: flex;
  justify-content: center;
  max-width: 700px;
  margin: 40px auto;
  padding: 0 24px 80px;
  box-sizing: border-box;
}
 
/* PANEL */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 28px;
  animation: fadeUp 0.4s ease both;
  width: 100%;
  max-width: 600px;
}
 
.panel + .panel { margin-top: 20px; }
 
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
 
.panel-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-title i {
  color: var(--sky);
  font-size: 0.9rem;
  width: 30px; height: 30px;
  background: rgba(56,189,248,0.1);
  border: 1px solid var(--border-md);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
 
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
 
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
 
 
.input-wrap { position: relative; }
.input-wrap i {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.82rem;
  pointer-events: none;
}
 
.field input, .field select {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 13px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  appearance: none;
}
 
.field input.has-icon, .field select.has-icon {
  padding-left: 36px;
}
 
.field input::placeholder { color: rgba(122,147,181,0.45); }
.field input:focus, .field select:focus {
  border-color: var(--sky);
  background: rgba(56,189,248,0.04);
}
 

 

.order-item {
  display: flex; align-items: center; gap: 14px;
  padding: 12px;
  background: var(--bg-surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  margin-bottom: 10px;
  transition: border-color 0.2s;
}
.order-item:hover { border-color: var(--border-md); }
.order-item:last-of-type { margin-bottom: 0; }
 
.item-thumb {
  width: 46px; height: 46px;
  border-radius: 10px;
  background: rgba(56,189,248,0.08);
  border: 1px solid var(--border-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; flex-shrink: 0;
}
.item-info { flex: 1; }
.item-info p { font-size: 0.88rem; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.item-info small { font-size: 0.76rem; color: var(--text-muted); }
.item-price {
  font-family: 'Syne', sans-serif;
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--text);
  text-align: right;
}
.item-qty {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 2px;
}
 

/* DIVIDER */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}
 
</style>
</head>
<body>

<header class="topbar">
  <a href="#" class="logo">Minsoft<span style="color:#a78bfa">.</span></a>
  <div class="breadcrumb">
    <span>Cart</span>
    <i class="fas fa-chevron-right"></i>
    <span>Checkout</span>
    <i class="fas fa-chevron-right"></i>
    <span class="active">Confirmation</span>
  </div>
  <div class="secure-badge">
    <i class="fas fa-lock"></i>
  </div>
</header>

<div class="steps-bar">
  <div class="step done">
    <div class="step-num"><i class="fas fa-check" style="font-size:0.65rem;"></i></div>
    Cart
  </div>
  <div class="step-line"></div>
  <div class="step done">
    <div class="step-num"><i class="fas fa-check" style="font-size:0.65rem;"></i></div>
    Checkout
  </div>
  <div class="step-line"></div>
  <div class="step active">
    <div class="step-num">3</div>
    Confirmation
  </div>
</div>

<div class="page">
  <div class="panel">
    <div class="panel-title">
      <i class="fas fa-check-circle"></i>
      Payment Result
    </div>
    <h2>Payment Approved!</h2>
    <div class = "field">
      <label>Order ID</label>
      <input type="text" value="ORD123456789" readonly>
      <label>Date</label>
      <input type="text" value="2023-10-10" readonly>
      <label>Total Amount</label>
      <input type="text" value="$99.99" readonly>
      <label>Product Ordered</label>
      <input type="text" value="Dell Inspiron 15 (Intel i5 · 16GB RAM · 512GB SSD)" readonly>
      <input type="text" value="Wireless Mouse" readonly>
    </div>
    <p style="margin-top: 12px;">Thank you for your purchase! Your payment has been successfully processed. You will receive an email confirmation shortly with the details of your order.</p>
  </div>
</div>


</body>
</html>
